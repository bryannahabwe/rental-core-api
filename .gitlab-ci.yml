stages:
  - build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

build:
  stage: build
  image: gradle:9.4.1-jdk25
  script:
    - echo "Building with Gradle 9.4 / Java 25..."
    - gradle clean bootJar -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 hour
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SERVER_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      ssh root@$SERVER_IP "
        cd /opt/cognix/rental-backend &&
        for i in 1 2 3; do
          git pull && break
          echo 'git pull failed, retrying in 5 seconds...'
          sleep 5
        done &&
        docker compose -f /opt/cognix/docker-compose.yml up -d --build rental-backend
      "
  only:
    - main
