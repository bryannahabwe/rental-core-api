openapi: 3.0.3
info:
  title: Rental Management API
  description: |
    Multi-tenant SaaS API for rental property management.
    Each landlord manages their own tenants, units, agreements, and payments
    in a fully isolated data context.

    ## Authentication
    All endpoints except `/auth/register`, `/auth/login`, and `/auth/refresh`
    require a Bearer JWT token in the Authorization header.

    ```
    Authorization: Bearer <access_token>
    ```

    ## Pagination
    All list endpoints support:
    - `page` — page number, zero-based (default: 0)
    - `size` — items per page (default: 10)
    - `sortBy` — field to sort by (default: createdAt)
    - `sortDir` — sort direction: asc or desc (default: desc)

    ## Search
    All list endpoints support backend search via a `search` query parameter.
    Search is case-insensitive and matches partial strings using JPQL LIKE queries.
    Uses `CAST(:search AS string)` to avoid PostgreSQL bytea type inference errors.

    ## Payment Periods
    Each payment records the month and year it covers (`periodMonth`, `periodYear`).
    Multiple payments are allowed per period (split payments).
    Overpayments automatically generate a ROLLOVER payment for the next period.
    Period status (PAID / PARTIAL / UNPAID / ROLLOVER) is computed dynamically.

    ## Tenant Types
    Agreements support two tenant types:
    - `NEW` — tenant moving in fresh, full history from day one
    - `EXISTING` — tenant already living there, being onboarded mid-tenancy
    Existing tenants support an `openingBalance` field to capture their
    financial position at the time of onboarding.

    ## Balance Visibility
    GET /tenants and GET /tenants/{id} return enriched responses including
    currentUnit, monthlyRent, currentBalance, periodStatus for the current month.

  version: 3.0.0
  contact:
    name: Bryan Nahabwe
    url: https://github.com/bryannahabwe

servers:
  - url: http://localhost:8081/api/v1
    description: Local development
  - url: https://<your-domain>/api/v1
    description: Production (Contabo VPS)

tags:
  - name: Auth
    description: Landlord registration and authentication
  - name: Tenants
    description: Tenant management with real-time balance visibility
  - name: Units
    description: Rental unit management
  - name: Agreements
    description: Rental agreement management (NEW and EXISTING tenant types)
  - name: Payments
    description: Period-based payment recording with overpayment rollover
  - name: Reports
    description: Analytics and reporting

paths:

  # ─── AUTH ───────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new landlord account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Bryan Nahabwe
              phoneNumber: "0771234567"
              email: bryan@example.com
              password: secret123
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with phone number or email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              phone:
                summary: Login with phone number
                value:
                  username: "0771234567"
                  password: secret123
              email:
                summary: Login with email
                value:
                  username: bryan@example.com
                  password: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─── TENANTS ─────────────────────────────────────────────

  /tenants:
    get:
      tags: [Tenants]
      summary: List all tenants with current month balance (paginated + search)
      description: |
        Returns a paginated list of tenants enriched with their current month's
        financial position. For each tenant with an active agreement, the response
        includes: currentUnit, monthlyRent, currentBalance, periodStatus,
        currentPeriodMonth, currentPeriodYear.

        Balance computation:
        1. Find active agreement for tenant
        2. Sum all payments for current month/year
        3. Apply opening balance credit (for EXISTING tenants)
        4. outstanding = rentAmount - effectivePaid
        5. Status: PAID / PARTIAL / UNPAID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive partial match on name, phone, or email.
          example: "john"
      responses:
        '200':
          description: Paginated list of tenants with balance info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTenantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Tenants]
      summary: Create a new tenant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
            example:
              name: John Mugisha
              phone: "0772345678"
              email: john.mugisha@gmail.com
              address: Kamwokya, Kampala
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get a single tenant with current month balance
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Tenant found with balance info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Tenants]
      summary: Update a tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Tenants]
      summary: Delete a tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Tenant deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── UNITS ───────────────────────────────────────────────

  /units:
    get:
      tags: [Units]
      summary: List all rental units (paginated + search + availability filter)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive partial match on roomNumber or description.
          example: "A1"
        - name: isAvailable
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Filter by availability.
            true = available only, false = occupied only, omit = all.
      responses:
        '200':
          description: Paginated list of units
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUnitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Units]
      summary: Create a new rental unit
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalUnitRequest'
            example:
              roomNumber: A1
              description: Single room with bathroom, ground floor
              rentAmount: 350000
              isAvailable: true
      responses:
        '201':
          description: Unit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalUnitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /units/{id}:
    get:
      tags: [Units]
      summary: Get a single rental unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Unit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalUnitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Units]
      summary: Update a rental unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalUnitRequest'
      responses:
        '200':
          description: Unit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalUnitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Units]
      summary: Delete a rental unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Unit deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── AGREEMENTS ──────────────────────────────────────────

  /agreements:
    get:
      tags: [Agreements]
      summary: List all agreements (paginated + search + status filter)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive partial match on tenant name or room number.
          example: "amara"
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AgreementStatus'
          description: Filter by agreement status
      responses:
        '200':
          description: Paginated list of agreements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAgreementResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Agreements]
      summary: Create a new rental agreement
      description: |
        Creates an agreement linking a tenant to a unit.

        **NEW tenant** (`tenantType: NEW`):
        - startDate is required
        - openingBalance defaults to 0
        - Full payment ledger from day one

        **EXISTING tenant** (`tenantType: EXISTING`):
        - startDate is optional (landlord may not know exact move-in date)
        - depositAmount is optional (may have been paid before the system)
        - openingBalance captures financial position at onboarding:
          - Positive = tenant has paid ahead (credit)
          - Negative = tenant owes arrears (debt)
          - Zero = fully up to date

        Creating an agreement auto-marks the unit as unavailable (isAvailable = false).
        rentAmount defaults to the unit's rent_amount if not provided.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalAgreementRequest'
            examples:
              new_tenant:
                summary: New tenant — full details
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: NEW
                  startDate: "2026-04-01"
                  rentAmount: 350000
                  depositAmount: 700000
              existing_tenant_paid_up:
                summary: Existing tenant — fully paid up
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: EXISTING
                  openingBalance: 0
              existing_tenant_in_arrears:
                summary: Existing tenant — owes one month
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: EXISTING
                  openingBalance: -350000
              existing_tenant_paid_ahead:
                summary: Existing tenant — paid two months ahead
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: EXISTING
                  openingBalance: 700000
      responses:
        '201':
          description: Agreement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agreements/{id}:
    get:
      tags: [Agreements]
      summary: Get a single agreement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Agreement found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Agreements]
      summary: Update an agreement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalAgreementRequest'
      responses:
        '200':
          description: Agreement updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agreements/{id}/moveout:
    patch:
      tags: [Agreements]
      summary: Record move-out date and terminate agreement
      description: |
        Records the tenant's move-out date and transitions the agreement
        status to TERMINATED. Also marks the unit as available again.

        If the agreement has a null startDate (EXISTING tenant onboarded without
        move-in date), the startDate comparison is skipped to avoid NullPointerException.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveOutRequest'
            example:
              moveOutDate: "2026-06-30"
      responses:
        '200':
          description: Move-out recorded, agreement terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── PAYMENTS ────────────────────────────────────────────

  /payments:
    get:
      tags: [Payments]
      summary: List all payments (paginated + search + date filter)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive partial match on tenant name, room number, or reference.
          example: "amara"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: |
            Start of payment date range (inclusive).
            Must be used with `to`. Uses a separate optimised repository query
            to avoid PostgreSQL bytea cast errors on nullable date params.
          example: "2026-04-01"
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End of payment date range (inclusive). Must be used with `from`.
          example: "2026-04-30"
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: agreementId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Payments]
      summary: Record a payment against an active agreement
      description: |
        Records a cash payment for a specific period (month + year).

        **Overpayment handling:**
        If `amount > agreement.rentAmount`, the excess is recorded as `overpayment`
        and a ROLLOVER payment is automatically created for the next period.
        Rollover chains recursively if the overpayment covers multiple months.

        **Split payments:**
        Multiple CASH payments are allowed per period. The system sums all payments
        for a period to determine the period status (PAID / PARTIAL).

        **Period status** is computed dynamically in PaymentResponse:
        - `PAID` — amount >= expectedAmount
        - `PARTIAL` — 0 < amount < expectedAmount
        - `UNPAID` — amount = 0 (not returned via API, computed on tenant side)
        - `ROLLOVER` — source = ROLLOVER (auto-created from overpayment)

        Cannot record payment against a TERMINATED agreement.
        Tenant and unit are derived automatically from the agreement.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              full_payment:
                summary: Full month payment
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-01"
                  amount: 350000
                  method: CASH
                  periodMonth: 4
                  periodYear: 2026
                  reference: RCP-001
                  notes: April rent payment
              overpayment:
                summary: Overpayment — covers two months
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-01"
                  amount: 700000
                  method: CASH
                  periodMonth: 4
                  periodYear: 2026
              partial_payment:
                summary: Partial payment
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-15"
                  amount: 200000
                  method: CASH
                  periodMonth: 4
                  periodYear: 2026
                  notes: Partial payment, balance to follow
      responses:
        '201':
          description: Payment recorded. If overpaid, rollover created for next period.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get a single payment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── REPORTS ─────────────────────────────────────────────

  /reports/summary:
    get:
      tags: [Reports]
      summary: Dashboard summary statistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
              example:
                totalUnits: 10
                occupiedUnits: 7
                availableUnits: 3
                totalTenants: 9
                activeAgreements: 7
                terminatedAgreements: 2
                totalRevenueAllTime: 4550000.00
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reports/payments:
    get:
      tags: [Reports]
      summary: Payment report for a date range
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-04-01"
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-04-30"
      responses:
        '200':
          description: Payment report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reports/occupancy:
    get:
      tags: [Reports]
      summary: Occupancy rate report
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Occupancy report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccupancyReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

# ─── COMPONENTS ──────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0

    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10

    SortBy:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
        default: createdAt

    SortDir:
      name: sortDir
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  responses:
    BadRequest:
      description: Validation or business rule error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: BAD_REQUEST
            message: Unit A1 already has an active agreement

    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: UNAUTHORIZED
            message: Invalid or expired token

  schemas:

    # ── Auth ──────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [name, phoneNumber, password]
      properties:
        name:
          type: string
          example: Bryan Nahabwe
        phoneNumber:
          type: string
          pattern: '^\+?[0-9]{10,15}$'
          example: "0771234567"
        email:
          type: string
          format: email
          nullable: true
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Phone number or email
          example: "0771234567"
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      description: |
        Returned flat (not nested) on register, login, and token refresh.
        Store name, phoneNumber, email directly in frontend auth state.
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        name:
          type: string
          example: John Katende
        phoneNumber:
          type: string
          example: "256774010511"
        email:
          type: string
          nullable: true

    # ── Tenants ───────────────────────────────────────────

    TenantRequest:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          example: John Mugisha
        phone:
          type: string
          example: "0772345678"
        email:
          type: string
          format: email
          nullable: true
        address:
          type: string
          nullable: true

    TenantResponse:
      type: object
      description: |
        Tenant data enriched with current month's financial position.
        Balance fields are null if the tenant has no active agreement.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        currentUnit:
          type: string
          nullable: true
          description: Room number of active unit. Null if no active agreement.
          example: "A3"
        monthlyRent:
          type: number
          format: decimal
          nullable: true
          description: Monthly rent from active agreement.
        currentBalance:
          type: number
          format: decimal
          nullable: true
          description: |
            Outstanding amount for current month.
            0 = fully paid. Positive = still owes. Null = no active agreement.
        periodStatus:
          type: string
          nullable: true
          enum: [PAID, PARTIAL, UNPAID]
          description: Payment status for current month. Null if no active agreement.
        currentPeriodMonth:
          type: integer
          nullable: true
          description: Current month number (1-12).
        currentPeriodYear:
          type: integer
          nullable: true

    PagedTenantResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/TenantResponse'

    # ── Units ─────────────────────────────────────────────

    RentalUnitRequest:
      type: object
      required: [roomNumber, rentAmount]
      properties:
        roomNumber:
          type: string
          example: A1
        description:
          type: string
          nullable: true
        rentAmount:
          type: number
          format: decimal
          example: 350000
        isAvailable:
          type: boolean
          default: true

    RentalUnitResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        roomNumber:
          type: string
        description:
          type: string
          nullable: true
        rentAmount:
          type: number
          format: decimal
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PagedUnitResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/RentalUnitResponse'

    # ── Agreements ────────────────────────────────────────

    AgreementStatus:
      type: string
      enum: [ACTIVE, TERMINATED]

    TenantType:
      type: string
      enum: [NEW, EXISTING]
      description: |
        NEW = tenant moving in fresh, full ledger from day one.
        EXISTING = tenant already living there, being onboarded mid-tenancy.

    RentalAgreementRequest:
      type: object
      required: [tenantId, unitId]
      properties:
        tenantId:
          type: string
          format: uuid
        unitId:
          type: string
          format: uuid
        tenantType:
          $ref: '#/components/schemas/TenantType'
          description: Defaults to NEW if not provided.
        startDate:
          type: string
          format: date
          nullable: true
          description: |
            Move-in date.
            Required for NEW tenants.
            Optional for EXISTING tenants (may not know exact date).
        rentAmount:
          type: number
          format: decimal
          nullable: true
          description: Defaults to unit rent amount if not provided.
        depositAmount:
          type: number
          format: decimal
          nullable: true
          description: Optional for EXISTING tenants already inside.
        openingBalance:
          type: number
          format: decimal
          nullable: true
          description: |
            Only relevant for EXISTING tenants.
            Captures financial position at time of onboarding.
            Positive = tenant has paid ahead (credit).
            Negative = tenant owes arrears (debt).
            Zero or null = fully up to date.
          example: -350000

    MoveOutRequest:
      type: object
      required: [moveOutDate]
      properties:
        moveOutDate:
          type: string
          format: date
          description: |
            The date the tenant moved out.
            Validated against startDate if not null.
            Skips validation if startDate is null (EXISTING tenant onboarded without date).
          example: "2026-06-30"

    RentalAgreementResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        unitId:
          type: string
          format: uuid
        roomNumber:
          type: string
        startDate:
          type: string
          format: date
          nullable: true
        moveOutDate:
          type: string
          format: date
          nullable: true
        rentAmount:
          type: number
          format: decimal
        depositAmount:
          type: number
          format: decimal
          nullable: true
        status:
          $ref: '#/components/schemas/AgreementStatus'
        tenantType:
          $ref: '#/components/schemas/TenantType'
        openingBalance:
          type: number
          format: decimal
          description: Financial position at onboarding. 0 for NEW tenants.
        createdAt:
          type: string
          format: date-time

    PagedAgreementResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/RentalAgreementResponse'

    # ── Payments ──────────────────────────────────────────

    PaymentMethod:
      type: string
      enum: [CASH]
      description: MVP supports CASH only. Mobile money planned post-MVP.

    PaymentSource:
      type: string
      enum: [CASH, ROLLOVER]
      description: |
        CASH = manually recorded by landlord.
        ROLLOVER = auto-created from previous period overpayment.

    PeriodStatus:
      type: string
      enum: [PAID, PARTIAL, ROLLOVER]
      description: |
        PAID = amount >= expectedAmount.
        PARTIAL = 0 < amount < expectedAmount.
        ROLLOVER = source is ROLLOVER (auto-created).

    PaymentRequest:
      type: object
      required: [agreementId, paymentDate, amount, method, periodMonth, periodYear]
      properties:
        agreementId:
          type: string
          format: uuid
          description: Must reference an ACTIVE agreement. Tenant and unit derived automatically.
        paymentDate:
          type: string
          format: date
          example: "2026-04-01"
        amount:
          type: number
          format: decimal
          example: 350000
        method:
          $ref: '#/components/schemas/PaymentMethod'
        periodMonth:
          type: integer
          minimum: 1
          maximum: 12
          description: Month this payment covers (1 = January, 12 = December).
          example: 4
        periodYear:
          type: integer
          description: Year this payment covers.
          example: 2026
        reference:
          type: string
          nullable: true
          example: RCP-001
        notes:
          type: string
          nullable: true

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agreementId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        unitId:
          type: string
          format: uuid
        roomNumber:
          type: string
        paymentDate:
          type: string
          format: date
        amount:
          type: number
          format: decimal
        method:
          $ref: '#/components/schemas/PaymentMethod'
        periodMonth:
          type: integer
          example: 4
        periodYear:
          type: integer
          example: 2026
        expectedAmount:
          type: number
          format: decimal
          description: Rent due for this period — copied from agreement at time of payment.
        overpayment:
          type: number
          format: decimal
          description: Excess above expectedAmount. 0 if not overpaid.
        source:
          $ref: '#/components/schemas/PaymentSource'
        periodStatus:
          $ref: '#/components/schemas/PeriodStatus'
        reference:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PagedPaymentResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/PaymentResponse'

    # ── Reports ───────────────────────────────────────────

    SummaryResponse:
      type: object
      properties:
        totalUnits:
          type: integer
        occupiedUnits:
          type: integer
        availableUnits:
          type: integer
        totalTenants:
          type: integer
        activeAgreements:
          type: integer
        terminatedAgreements:
          type: integer
        totalRevenueAllTime:
          type: number
          format: decimal
          description: Total of all payments recorded across all time for this landlord.

    PaymentReportResponse:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalPayments:
          type: integer
        totalAmount:
          type: number
          format: decimal

    OccupancyReportResponse:
      type: object
      properties:
        totalUnits:
          type: integer
        occupiedUnits:
          type: integer
        availableUnits:
          type: integer
        occupancyRate:
          type: number
          format: decimal
          description: Percentage of occupied units (0.00 - 100.00)

    # ── Shared ────────────────────────────────────────────

    PagedResponse:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 10
        totalElements:
          type: integer
          example: 45
        totalPages:
          type: integer
          example: 5
        last:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Unit A1 already has an active agreement