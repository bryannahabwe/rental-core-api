openapi: 3.0.3
info:
  title: Rental Management API
  description: |
    Multi-tenant SaaS API for rental property management in Uganda.

    ## Authentication
    All endpoints except `/auth/register`, `/auth/login`, and `/auth/refresh`
    require a Bearer JWT token:
    ```
    Authorization: Bearer <access_token>
    ```

    ## Token Expiry
    - Access tokens expire after 24 hours.
    - On 401, the frontend attempts a silent refresh via `/auth/refresh`.
    - If refresh fails, the user is logged out and redirected to `/login`.

    ## Pagination
    All list endpoints support: `page` (default 0), `size` (default 10),
    `sortBy` (default createdAt), `sortDir` (asc/desc, default desc).

    ## Billing Cycles
    Each agreement has a `billingDay` (1–28) derived automatically from
    `startDate`. Payments are recorded against exact cycle date ranges
    (`periodStartDate` to `periodEndDate`) rather than month/year numbers.

    Two billing models are supported per agreement:
    - `ADVANCE` — tenant pays at the start of each cycle
    - `ARREARS` — tenant pays at the end of each cycle

    ## Balance Computation
    Outstanding balance is cumulative across all cycles, not just the current month.
    Unpaid previous months are automatically included.

    ## Overpayment
    When a payment exceeds the expected amount, the excess is auto-applied
    as a ROLLOVER payment to the next cycle. Chains recursively if needed.

  version: 4.0.0

servers:
  - url: http://localhost:8081/api/v1
    description: Local development
  - url: https://<your-domain>/api/v1
    description: Production

tags:
  - name: Auth
  - name: Tenants
  - name: Units
  - name: Agreements
  - name: Payments
  - name: Reports

paths:

  # ─── AUTH ──────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new landlord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Bryan Nahabwe
              phoneNumber: "0771234567"
              password: secret123
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with phone or email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              phone:
                value: { username: "0771234567", password: secret123 }
              email:
                value: { username: bryan@example.com, password: secret123 }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchange a valid refresh token for a new access token.
        Called automatically by the frontend Axios interceptor on 401.
        If this call fails, the user is logged out and redirected to /login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─── TENANTS ───────────────────────────────────────────

  /tenants:
    get:
      tags: [Tenants]
      summary: List all tenants with cumulative balance
      description: |
        Returns paginated tenants enriched with their cumulative outstanding balance.
        Balance is computed across ALL billing cycles, not just the current month.
        Unpaid previous months are included automatically.

        Balance computation:
        1. Find active agreement
        2. cyclesElapsed = BillingCycleUtils.cyclesElapsed(agreement)
        3. totalEverOwed = rentAmount × cyclesElapsed
        4. Apply opening balance (credit or arrears)
        5. outstanding = totalEverOwed - sumAllPayments
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          schema:
            type: string
          description: Partial match on name, phone, or email
      responses:
        '200':
          description: Paginated tenants with balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTenantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Tenants]
      summary: Create a tenant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get a tenant with cumulative balance
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Tenant found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Tenants]
      summary: Update a tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantRequest'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Tenants]
      summary: Delete a tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── UNITS ─────────────────────────────────────────────

  /units:
    get:
      tags: [Units]
      summary: List all units (paginated + search + availability)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          schema:
            type: string
        - name: isAvailable
          in: query
          schema:
            type: boolean
          description: true = available only, false = occupied only, omit = all
      responses:
        '200':
          description: Paginated units
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUnitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Units]
      summary: Create a unit
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalUnitRequest'
      responses:
        '201':
          description: Unit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalUnitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /units/{id}:
    get:
      tags: [Units]
      summary: Get a unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Unit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalUnitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Units]
      summary: Update a unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalUnitRequest'
      responses:
        '200':
          description: Unit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalUnitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Units]
      summary: Delete a unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── AGREEMENTS ────────────────────────────────────────

  /agreements:
    get:
      tags: [Agreements]
      summary: List all agreements (paginated + search + status)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AgreementStatus'
      responses:
        '200':
          description: Paginated agreements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAgreementResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Agreements]
      summary: Create an agreement
      description: |
        Creates an agreement linking a tenant to a unit.

        **billingDay** is derived automatically from `startDate` (day of month, capped at 28).
        **billingModel** defaults to ADVANCE if not provided.

        **NEW tenant** — startDate required, openingBalance defaults to 0.

        **EXISTING tenant** — set `startDate` to the first billing cycle you want
        the system to track going forward. Set `openingBalance` to the total unpaid
        amount before that date (negative = owes arrears, positive = paid ahead).

        Example for ARREARS tenant who last paid Dec 15→Jan 14, onboarding Apr 15:
        - startDate = 2026-04-15 (next cycle start)
        - openingBalance = -540000 (3 months × 180,000 owed before Apr 15)
        - billingModel = ARREARS
        - System outstanding today = 540,000 (from opening) + 0 (Apr cycle not due yet)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalAgreementRequest'
            examples:
              new_tenant:
                summary: New tenant
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: NEW
                  billingModel: ADVANCE
                  startDate: "2026-04-01"
                  rentAmount: 350000
                  depositAmount: 700000
              existing_advance:
                summary: Existing tenant — ADVANCE, in arrears
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: EXISTING
                  billingModel: ADVANCE
                  startDate: "2026-04-15"
                  openingBalance: -540000
              existing_arrears:
                summary: Existing tenant — ARREARS, in arrears
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: EXISTING
                  billingModel: ARREARS
                  startDate: "2026-04-15"
                  openingBalance: -540000
              existing_paid_ahead:
                summary: Existing tenant — paid ahead
                value:
                  tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
                  tenantType: EXISTING
                  billingModel: ADVANCE
                  startDate: "2026-04-01"
                  openingBalance: 350000
      responses:
        '201':
          description: Agreement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agreements/{id}:
    get:
      tags: [Agreements]
      summary: Get an agreement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Agreement found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Agreements]
      summary: Update an agreement
      description: |
        Updates allowed fields on an existing agreement.
        Updatable: rentAmount, depositAmount, startDate, billingModel, openingBalance.
        billingDay is re-derived from startDate if startDate is updated.
        tenantId and unitId cannot be changed after creation.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalAgreementRequest'
            example:
              tenantId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              unitId: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
              billingModel: ARREARS
              startDate: "2026-04-15"
              openingBalance: -540000
      responses:
        '200':
          description: Agreement updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agreements/{id}/moveout:
    patch:
      tags: [Agreements]
      summary: Record move-out and terminate agreement
      description: |
        Records move-out date, sets status to TERMINATED, marks unit as available.
        Skips startDate comparison if startDate is null (EXISTING tenant without history).
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveOutRequest'
            example:
              moveOutDate: "2026-06-30"
      responses:
        '200':
          description: Terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalAgreementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── PAYMENTS ──────────────────────────────────────────

  /payments:
    get:
      tags: [Payments]
      summary: List all payments (paginated + search + date filter)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDir'
        - name: search
          in: query
          schema:
            type: string
          description: Partial match on tenant name, room number, or reference
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Payment date range start (inclusive). Must be used with `to`.
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: Payment date range end (inclusive). Must be used with `from`.
        - name: tenantId
          in: query
          schema:
            type: string
            format: uuid
        - name: agreementId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Payments]
      summary: Record a payment
      description: |
        Records a cash payment for a specific billing cycle.

        **Period:** Specified as exact cycle dates (`periodStartDate`, `periodEndDate`)
        matching the agreement's billing cycle. The frontend cycle picker generates
        these dates based on the agreement's billingDay.

        **Overpayment:** If `amount > rentAmount`, the excess is auto-applied as a
        ROLLOVER payment to the next cycle. Chains recursively across months.

        **Split payments:** Multiple CASH payments per cycle are allowed.

        **Period status** (computed in response):
        - PAID — amount >= expectedAmount
        - PARTIAL — 0 < amount < expectedAmount
        - ROLLOVER — source = ROLLOVER (auto-created)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              full_payment:
                summary: Full cycle payment (billing_day = 15)
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-15"
                  amount: 350000
                  method: CASH
                  periodStartDate: "2026-04-15"
                  periodEndDate: "2026-05-14"
                  reference: RCP-001
              overpayment:
                summary: Overpayment — covers two cycles
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-15"
                  amount: 700000
                  method: CASH
                  periodStartDate: "2026-04-15"
                  periodEndDate: "2026-05-14"
              partial:
                summary: Partial payment
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-15"
                  amount: 200000
                  method: CASH
                  periodStartDate: "2026-04-15"
                  periodEndDate: "2026-05-14"
                  notes: Balance to follow
              calendar_month:
                summary: Calendar month payment (billing_day = 1)
                value:
                  agreementId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  paymentDate: "2026-04-01"
                  amount: 350000
                  method: CASH
                  periodStartDate: "2026-04-01"
                  periodEndDate: "2026-04-30"
      responses:
        '201':
          description: Payment recorded. ROLLOVER auto-created if overpaid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get a payment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── REPORTS ───────────────────────────────────────────

  /reports/summary:
    get:
      tags: [Reports]
      summary: Dashboard summary statistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reports/payments:
    get:
      tags: [Reports]
      summary: Payment report for a date range
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Payment report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reports/occupancy:
    get:
      tags: [Reports]
      summary: Occupancy rate
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Occupancy report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccupancyReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

# ─── COMPONENTS ────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 10
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        default: createdAt
    SortDir:
      name: sortDir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  responses:
    BadRequest:
      description: Validation or business rule error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: BAD_REQUEST
            message: Unit A1 already has an active agreement
    Unauthorized:
      description: Missing, invalid, or expired JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: UNAUTHORIZED
            message: Invalid or expired token

  schemas:

    # ── Auth ────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [name, phoneNumber, password]
      properties:
        name:
          type: string
        phoneNumber:
          type: string
          example: "0771234567"
        email:
          type: string
          format: email
          nullable: true
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Phone number or email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        name:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
          nullable: true

    # ── Tenants ─────────────────────────────────────────

    TenantRequest:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true

    TenantResponse:
      type: object
      description: |
        Tenant enriched with cumulative outstanding balance from active agreement.
        Balance fields are null if tenant has no active agreement.
        currentCycleStart/End reflect the billing cycle dates (e.g. Apr 15 – May 14).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        currentUnit:
          type: string
          nullable: true
          description: Room number of active unit
          example: "A3"
        monthlyRent:
          type: number
          format: decimal
          nullable: true
        currentBalance:
          type: number
          format: decimal
          nullable: true
          description: |
            Cumulative outstanding amount across all due billing cycles.
            0 = fully paid. Positive = owes money. Null = no active agreement.
        periodStatus:
          type: string
          nullable: true
          enum: [PAID, PARTIAL, UNPAID]
        currentCycleStart:
          type: string
          format: date
          nullable: true
          description: Start date of current billing cycle (e.g. 2026-04-15)
        currentCycleEnd:
          type: string
          format: date
          nullable: true
          description: End date of current billing cycle (e.g. 2026-05-14)

    PagedTenantResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/TenantResponse'

    # ── Units ───────────────────────────────────────────

    RentalUnitRequest:
      type: object
      required: [roomNumber, rentAmount]
      properties:
        roomNumber:
          type: string
          example: A1
        description:
          type: string
          nullable: true
        rentAmount:
          type: number
          format: decimal
        isAvailable:
          type: boolean
          default: true

    RentalUnitResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        roomNumber:
          type: string
        description:
          type: string
          nullable: true
        rentAmount:
          type: number
          format: decimal
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PagedUnitResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/RentalUnitResponse'

    # ── Agreements ──────────────────────────────────────

    AgreementStatus:
      type: string
      enum: [ACTIVE, TERMINATED]

    TenantType:
      type: string
      enum: [NEW, EXISTING]
      description: |
        NEW = moving in fresh, full ledger from day one.
        EXISTING = already living there, being onboarded mid-tenancy.

    BillingModel:
      type: string
      enum: [ADVANCE, ARREARS]
      description: |
        ADVANCE = tenant pays at the START of each billing cycle.
                  First payment due on move-in day (billingDay).
        ARREARS  = tenant pays at the END of each billing cycle.
                   First payment due one full cycle after move-in.

    RentalAgreementRequest:
      type: object
      required: [tenantId, unitId]
      properties:
        tenantId:
          type: string
          format: uuid
        unitId:
          type: string
          format: uuid
        tenantType:
          $ref: '#/components/schemas/TenantType'
          description: Defaults to NEW if not provided
        billingModel:
          $ref: '#/components/schemas/BillingModel'
          description: Defaults to ADVANCE if not provided
        startDate:
          type: string
          format: date
          nullable: true
          description: |
            Move-in date (NEW) or first billing cycle start date (EXISTING).
            billingDay is derived automatically from this date (day of month, capped at 28).
            For EXISTING tenants: set to the first cycle you want to track going forward.
        rentAmount:
          type: number
          format: decimal
          nullable: true
          description: Defaults to unit rent if not provided
        depositAmount:
          type: number
          format: decimal
          nullable: true
        openingBalance:
          type: number
          format: decimal
          nullable: true
          description: |
            Only for EXISTING tenants.
            Positive = paid ahead (credit reduces outstanding).
            Negative = owes historical arrears (increases outstanding).
            Set to total unpaid amount before startDate. Leave 0 if up to date.
          example: -540000

    MoveOutRequest:
      type: object
      required: [moveOutDate]
      properties:
        moveOutDate:
          type: string
          format: date
          example: "2026-06-30"

    RentalAgreementResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        unitId:
          type: string
          format: uuid
        roomNumber:
          type: string
        startDate:
          type: string
          format: date
          nullable: true
        moveOutDate:
          type: string
          format: date
          nullable: true
        rentAmount:
          type: number
          format: decimal
        depositAmount:
          type: number
          format: decimal
          nullable: true
        status:
          $ref: '#/components/schemas/AgreementStatus'
        tenantType:
          $ref: '#/components/schemas/TenantType'
        openingBalance:
          type: number
          format: decimal
          description: Positive = credit, Negative = arrears. 0 for NEW tenants.
        billingDay:
          type: integer
          description: Day of month rent is due (1–28). Derived from startDate.
          example: 15
        billingModel:
          $ref: '#/components/schemas/BillingModel'
        createdAt:
          type: string
          format: date-time

    PagedAgreementResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/RentalAgreementResponse'

    # ── Payments ────────────────────────────────────────

    PaymentMethod:
      type: string
      enum: [CASH]
      description: MVP supports CASH only.

    PaymentSource:
      type: string
      enum: [CASH, ROLLOVER]
      description: |
        CASH = manually recorded by landlord.
        ROLLOVER = auto-created from previous cycle overpayment.

    PeriodStatus:
      type: string
      enum: [PAID, PARTIAL, ROLLOVER]
      description: Computed dynamically. Never stored.

    PaymentRequest:
      type: object
      required: [agreementId, paymentDate, amount, method, periodStartDate, periodEndDate]
      properties:
        agreementId:
          type: string
          format: uuid
          description: Must be ACTIVE. Tenant and unit derived automatically.
        paymentDate:
          type: string
          format: date
        amount:
          type: number
          format: decimal
        method:
          $ref: '#/components/schemas/PaymentMethod'
        periodStartDate:
          type: string
          format: date
          description: |
            Start of the billing cycle this payment covers.
            Generated by the frontend cycle picker based on agreement billingDay.
          example: "2026-04-15"
        periodEndDate:
          type: string
          format: date
          description: |
            End of the billing cycle this payment covers.
            One day before the next cycle start.
          example: "2026-05-14"
        reference:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agreementId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        unitId:
          type: string
          format: uuid
        roomNumber:
          type: string
        paymentDate:
          type: string
          format: date
        amount:
          type: number
          format: decimal
        method:
          $ref: '#/components/schemas/PaymentMethod'
        periodStartDate:
          type: string
          format: date
          example: "2026-04-15"
        periodEndDate:
          type: string
          format: date
          example: "2026-05-14"
        expectedAmount:
          type: number
          format: decimal
          description: Rent due for this cycle (copied from agreement at time of payment)
        overpayment:
          type: number
          format: decimal
          description: Excess above expectedAmount. 0 if not overpaid.
        source:
          $ref: '#/components/schemas/PaymentSource'
        periodStatus:
          $ref: '#/components/schemas/PeriodStatus'
        reference:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PagedPaymentResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/PaymentResponse'

    # ── Reports ─────────────────────────────────────────

    SummaryResponse:
      type: object
      properties:
        totalUnits:
          type: integer
        occupiedUnits:
          type: integer
        availableUnits:
          type: integer
        totalTenants:
          type: integer
        activeAgreements:
          type: integer
        terminatedAgreements:
          type: integer
        totalRevenueAllTime:
          type: number
          format: decimal

    PaymentReportResponse:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        totalPayments:
          type: integer
        totalAmount:
          type: number
          format: decimal

    OccupancyReportResponse:
      type: object
      properties:
        totalUnits:
          type: integer
        occupiedUnits:
          type: integer
        availableUnits:
          type: integer
        occupancyRate:
          type: number
          format: decimal
          description: Percentage (0.00–100.00)

    # ── Shared ──────────────────────────────────────────

    PagedResponse:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 10
        totalElements:
          type: integer
          example: 45
        totalPages:
          type: integer
          example: 5
        last:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Unit A1 already has an active agreement